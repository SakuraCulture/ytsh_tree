server:
    port: 8080
    address: 0.0.0.0 # 允许局域网访问
--- #################### 数据库相关配置 ####################

spring:
    main:
        lazy-initialization: true # 启动耗时排查：延迟初始化 Bean，观察启动时间是否明显下降
    autoconfigure:
        # noinspection SpringBootApplicationYaml
        exclude:
            - org.springframework.ai.vectorstore.qdrant.autoconfigure.QdrantVectorStoreAutoConfiguration # 禁用 AI 模块的 Qdrant，手动创建
            - org.springframework.ai.vectorstore.milvus.autoconfigure.MilvusVectorStoreAutoConfiguration # 禁用 AI 模块的 Milvus，手动创建
    # 数据源配置项
    datasource:
        druid: # Druid 【监控】相关的全局配置
            web-stat-filter:
                enabled: true
            stat-view-servlet:
                enabled: true
                allow: # 设置白名单，不填则允许所有访问
                url-pattern: /druid/*
                login-username: # 控制台管理用户名和密码
                login-password:
            filter:
                stat:
                    enabled: true
                    log-slow-sql: true # 慢 SQL 记录
                    slow-sql-millis: 100
                    merge-sql: true
                wall:
                    config:
                        multi-statement-allow: true
        dynamic: # 多数据源配置
            druid: # Druid 【连接池】相关的全局配置
                initial-size: 5 # 初始连接数
                min-idle: 5 # 最小空闲连接数
                max-active: 30 # 最大连接池数量
                max-wait: 30000 # 配置获取连接等待超时的时间，单位：毫秒（30秒）
                time-between-eviction-runs-millis: 30000 # 30 秒巡检一次空闲连接
                min-evictable-idle-time-millis: 300000 # 空闲 5 分钟后再参与回收/保活检测
                max-evictable-idle-time-millis: 900000 # 空闲连接最长保留 15 分钟
                validation-query: SELECT 1 # MySQL 连接有效性检查
                test-while-idle: true
                test-on-borrow: false # 关闭借连接时校验，减少每次获取连接的额外检查
                test-on-return: false
                keep-alive: true # 保持连接活性，减少远程链路空闲断开
                pool-prepared-statements: true # 是否开启 PreparedStatement 缓存
                max-pool-prepared-statement-per-connection-size: 20 # 每个连接缓存的 PreparedStatement 数量
                remove-abandoned: true # 自动回收泄漏连接
                remove-abandoned-timeout: 300 # 超过 5 分钟的连接强制回收
                log-abandoned: true # 记录泄漏连接日志
            primary: master
            datasource:
                master:
                    url: jdbc:mysql://rm-2ze347fljj75ppe859o.mysql.rds.aliyuncs.com:3306/ytsh_prod?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
                    username: root
                    password: mysql$prod2026@ytsh
                slave:
                    lazy: true
                    url: jdbc:mysql://rm-2ze347fljj75ppe859o.mysql.rds.aliyuncs.com:3306/ytsh_prod?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
                    username: root
                    password: mysql$prod2026@ytsh

    # Redis 配置。Redisson 默认的配置足够使用，一般不需要进行调优
    data:
        redis:
            host: 172.25.255.180 # 地址
            port: 6579 # 端口
            username: default
            password: YTSH+redis@2026
            #      password: YTSH_redis_2026
            database: 0 # 数据库索引
            connect-timeout: 15s # 建连超时，避免远程 Redis 偶发抖动时过快失败
            timeout: 30s # 命令执行超时，适当放宽减少 PING 超时误报
            redisson:
                config: |
                    singleServerConfig:
                      address: "redis://172.25.255.180:6579"
                      username: "default"
                      password: "YTSH+redis@2026"
                      database: 0
                      connectTimeout: 15000
                      timeout: 30000
                      pingConnectionInterval: 3000
                      keepAlive: true
                      tcpNoDelay: true
                      idleConnectionTimeout: 60000
                      connectionMinimumIdleSize: 10
                      connectionPoolSize: 64
                      retryAttempts: 5
                      retryInterval: 3000
                      subscriptionConnectionMinimumIdleSize: 2
                      subscriptionConnectionPoolSize: 8
                    threads: 32
                    nettyThreads: 64
                    codec: !<org.redisson.codec.Kryo5Codec> {}
                    transportMode: "NIO"


