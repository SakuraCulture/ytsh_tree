--- #################### 定时任务相关配置 ####################

# Quartz 配置项，对应 QuartzProperties 配置类
spring:
    quartz:
        auto-startup: false # 开发环境关闭 Quartz
        scheduler-name: schedulerName # Scheduler 名字。默认为 schedulerName
        job-store-type: jdbc # Job 存储器类型。默认为 memory 表示内存，可选 jdbc 使用数据库。
        wait-for-jobs-to-complete-on-shutdown: true # 应用关闭时，是否等待定时任务执行完成。默认为 false ，建议设置为 true
        properties: # 添加 Quartz Scheduler 附加属性，更多可以看 http://www.quartz-scheduler.org/documentation/2.4.0-SNAPSHOT/configuration.html 文档
            org:
                quartz:
                    # Scheduler 相关配置
                    scheduler:
                        instanceName: schedulerName
                        instanceId: AUTO # 自动生成 instance ID
                    # JobStore 相关配置
                    jobStore:
                        # JobStore 实现类。可见博客：https://blog.csdn.net/weixin_42458219/article/details/122247162
                        class: org.springframework.scheduling.quartz.LocalDataSourceJobStore
                        isClustered: true # 是集群模式
                        clusterCheckinInterval: 15000 # 集群检查频率，单位：毫秒。默认为 15000，即 15 秒
                        misfireThreshold: 60000 # misfire 阀值，单位：毫秒。
                    # 线程池相关配置
                    threadPool:
                        threadCount: 25 # 线程池大小。默认为 10 。
                        threadPriority: 5 # 线程优先级
                        class: org.quartz.simpl.SimpleThreadPool # 线程池类型
        jdbc: # 使用 JDBC 的 JobStore 的时候，JDBC 的配置
            initialize-schema: NEVER # 是否自动使用 SQL 初始化 Quartz 表结构。这里设置成 never ，我们手动创建表结构。
    task:
        scheduling:
            enabled: false # 开发环境关闭 Spring @Scheduled 定时任务

# 饿了么订单同步线程池配置
ele:
    order:
        sync:
            batch-size: 5 # 每批提交门店数(降低并发锁数量，减少Redisson看门狗续期压力)
            pool:
                core-size: 5 # 核心线程数(降低并发数，减少Redis连接和锁续期压力)
                max-size: 10 # 最大线程数(限制最大并发，避免Redis续期超时)
                queue-capacity: 500 # 队列容量(缓冲15-25分钟的任务量)
                keep-alive-seconds: 120 # 空闲线程存活时间(秒)(减少频繁创建销毁)
            shutdown:
                await-termination: true # 关闭时等待任务完成
                await-termination-seconds: 60 # 最多等待时间（秒）
        compensate:
            pool:
                core-size: 2 # 核心线程数
                max-size: 5 # 最大线程数
                queue-capacity: 100 # 队列容量
                keep-alive-seconds: 60 # 空闲线程存活时间（秒）
        retry:
            pool:
                core-size: 5 # 核心线程数
                max-size: 10 # 最大线程数
                queue-capacity: 1000 # 队列容量
                keep-alive-seconds: 60 # 空闲线程存活时间（秒）
            alarm:
                queue-threshold: 70 # 队列使用率告警阈值（%）
                active-threshold: 80 # 活跃率告警阈值（%）
                enabled: true # 是否启用告警
        failed-retry:
            cron: '0 0 2 * * ?' # 每天凌晨2点自动重试全部失败订单（可通过前端修改）
            enabled: true # 是否启用定时重试

--- #################### 消息队列相关 ####################

# rocketmq 配置项，对应 RocketMQProperties 配置类
rocketmq:
    name-server: 127.0.0.1:9876 # RocketMQ Namesrv

spring:
    # RabbitMQ 配置项，对应 RabbitProperties 配置类
    rabbitmq:
        host: 127.0.0.1 # RabbitMQ 服务的地址
        port: 5672 # RabbitMQ 服务的端口
        username: guest # RabbitMQ 服务的账号
        password: guest # RabbitMQ 服务的密码
    # Kafka 配置项，对应 KafkaProperties 配置类（带认证）
    kafka:
        bootstrap-servers: 172.25.255.180:9094 # Kafka Broker 地址
        # Producer 配置
        producer:
            acks: all # 所有 leader 和 follower 应答
            retries: 3 # 重试次数
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
            properties:
                sasl:
                    mechanism: PLAIN
                security:
                    protocol: SASL_PLAINTEXT
        # Consumer 配置
        consumer:
            auto-offset-reset: earliest # 从最早 offset 开始消费
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
            properties:
                sasl:
                    mechanism: PLAIN
                security:
                    protocol: SASL_PLAINTEXT
        # 认证配置
        properties:
            sasl:
                jaas:
                    config: org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="Kafka2026@ytsh";
            spring:
                json:
                    trusted:
                        packages: '*'
        # Listener 配置
        listener:
            missing-topics-fatal: false # 主题不存在不报错

# Ele 订单模块 Kafka 配置
ele:
    kafka:
        topic:
            realtime: ele-order-realtime # 实时订单 Topic
        consumer:
            group-id: ele-order-realtime-consumer
        retry:
            topic: ele-order-retry # 重试订单 Topic
            dlq-topic: ele-order-retry-dlq # 死信队列 Topic
            max-retry-count: 3 # 最大重试次数
            consumer:
                group-id: ele-order-retry-consumer # 重试消费者组
                dlq-group-id: ele-order-retry-dlq-consumer # 死信消费者组
                concurrency: 5 # 并发消费者数

# WebSocket 配置（使用 Kafka 作为消息发送）
yudao:
    websocket:
        enable: true
        sender-type: kafka
        sender-kafka:
            topic: ${spring.application.name}-websocket # WebSocket 消息 Topic
            consumer-group: ${spring.application.name}-websocket-consumer
    captcha:
        enable: false # 隔离环境关闭登录验证码，便于联调

--- #################### 服务保障相关配置 ####################

# Lock4j 配置项
lock4j:
    acquire-timeout: 10000 # 获取分布式锁超时时间，默认为 3000 毫秒
    expire: 60000 # 分布式锁的超时时间，默认为 30 毫秒

--- #################### 监控相关配置 ####################

# Actuator 监控端点的配置项
management:
    endpoints:
        web:
            base-path: /actuator # Actuator 提供的 API 接口的根目录。默认为 /actuator
            exposure:
                include: '*' # 需要开放的端点。默认值只打开 health 和 info 两个端点。通过设置 * ，可以开放所有端点。

# Spring Boot Admin 配置项
spring:
    boot:
        admin:
            # Spring Boot Admin Client 客户端的相关配置
            client:
                url: http://127.0.0.1:${server.port}/${spring.boot.admin.context-path} # 设置 Spring Boot Admin Server 地址
                instance:
                    service-host-type: IP # 注册实例时，优先使用 IP [IP, HOST_NAME, CANONICAL_HOST_NAME]
                username: admin
                password: admin
            # Spring Boot Admin Server 服务端的相关配置
            context-path: /admin # 配置 Spring

# 日志文件配置
logging:
    file:
        name: ${user.home}/logs/${spring.application.name}.log # 日志文件名，全路径
    level:
        # Spring Security 请求认证与授权流程
        org.springframework.security: ERROR 
        # Spring MVC 请求路由匹配
        org.springframework.web.servlet: ERROR
        # Token 认证过滤器、业务代码
        cn.iocoder.yudao: ERROR
        # 将 MyBatis-Plus 的日志级别调整为 WARN 或 ERROR，过滤SQL详细日志
        cn.iocoder.yudao.module.*.dal.mysql: ERROR
        com.baomidou.mybatisplus: ERROR
        # 关闭饿了么SDK详细日志输出
        ApiExecutor: ERROR
        AbstractHttpClient: ERROR
        me.ele: ERROR
        lib.ele: ERROR
        ocean: ERROR

