--- #################### 定时任务相关配置 ####################

# Quartz 配置项，对应 QuartzProperties 配置类
spring:
    quartz:
        auto-startup: false # 开发环境关闭 sQuartz
        scheduler-name: schedulerName # Scheduler 名字。默认为 schedulerName
        job-store-type: jdbc # Job 存储器类型。默认为 memory 表示内存，可选 jdbc 使用数据库。
        wait-for-jobs-to-complete-on-shutdown: true # 应用关闭时，是否等待定时任务执行完成。默认为 false ，建议设置为 true
        properties: # 添加 Quartz Scheduler 附加属性，更多可以看 http://www.quartz-scheduler.org/documentation/2.4.0-SNAPSHOT/configuration.html 文档
            org:
                quartz:
                    # Scheduler 相关配置
                    scheduler:
                        instanceName: schedulerName
                        instanceId: AUTO # 自动生成 instance ID
                    # JobStore 相关配置
                    jobStore:
                        # JobStore 实现类。可见博客：https://blog.csdn.net/weixin_42458219/article/details/122247162
                        class: org.springframework.scheduling.quartz.LocalDataSourceJobStore
                        isClustered: true # 是集群模式
                        clusterCheckinInterval: 15000 # 集群检查频率，单位：毫秒。默认为 15000，即 15 秒
                        misfireThreshold: 60000 # misfire 阀值，单位：毫秒。
                    # 线程池相关配置
                    threadPool:
                        threadCount: 25 # 线程池大小。默认为 10 。
                        threadPriority: 5 # 线程优先级
                        class: org.quartz.simpl.SimpleThreadPool # 线程池类型
        jdbc: # 使用 JDBC 的 JobStore 的时候，JDBC 的配置
            initialize-schema: NEVER # 是否自动使用 SQL 初始化 Quartz 表结构。这里设置成 never ，我们手动创建表结构。
    task:
        scheduling:
            enabled: false # 开发环境关闭 Spring @Scheduled 定时任务

# 饿了么订单同步线程池配置
ele:
    bill:
        scheduler:
            enabled: true
            time: '01:00'
            offset-days: 3
    traffic:
        metrics:
            enabled: false # 是否启用翱象接口流量采集
            realtime-record-enabled: false # 大批量拉单时关闭逐请求明细，仅保留聚合统计，降低Redis压力
            flush-interval-ms: 5000 # 本地内存聚合刷入Redis间隔
            degradation-check-interval-ms: 30000 # Redis异常后恢复探测间隔
            retention-days: 3 # 流量统计保留天数
    saas:
        push:
            enabled: false # SaaS推送总开关（Controller和Consumer共用），默认关闭
    api:
        rate-limit:
            enabled: true # 是否启用翱象接口级全局限流
            wait-interval-ms: 100 # 超过QPS时排队轮询等待间隔
            backlog-pause-enabled: true # 有接口请求排队时暂停后续批量请求生产
            apis:
                orderList:
                    api-code: me.ele.retail:saas.order.list
                    display-name: 订单列表查询
                    qps: 200 # 官方200QPS，门店串行后保留余量
                orderGet:
                    api-code: me.ele.retail:saas.order.get
                    display-name: 正向订单详情查询
                    qps: 360 # 官方400QPS，详情补全小并发保守限流
    order:
        sync:
            store-concurrent-enabled: false # 关闭门店级并发，门店串行同步
            store-concurrency: 1 # 门店并发数，关闭并发时固定为1
            batch-size: 20 # 串行模式下用于批次日志和进度控制
            page-size: 100 # 订单列表分页大小，最大100
            page-timeout-seconds: 120 # 订单列表单页安全阀
            detail-enrich:
                enabled: true # 是否在分页同步中补全详情
                concurrency: 5 # 单页详情补全并发数
                timeout-seconds: 30 # 单页详情补全总预算
                single-timeout-seconds: 10 # 单个详情等待超时
                max-per-page: 100 # 单页最多补全详情数量，默认覆盖整页订单
                degrade-on-timeout: true # 详情超时降级，不影响分页和整店同步
                fail-record-enabled: true # 详情失败/超时写入待重试记录
                statuses: '' # 空表示所有标准状态都补详情；如需过滤可配置为 2,3
            pool:
                core-size: 10 # 订单同步核心线程数（生产环境）
                max-size: 20 # 订单同步最大线程数（生产环境）
                queue-capacity: 200 # 队列容量
                keep-alive-seconds: 60 # 空闲线程存活时间（秒）
            shutdown:
                await-termination: true # 关闭时等待任务完成
                await-termination-seconds: 60 # 最多等待时间（秒）
        detail:
            pool:
                core-size: 10 # 详情补全核心线程数（生产环境）
                max-size: 20 # 详情补全最大线程数（生产环境）
                queue-capacity: 300 # 详情补全队列容量
                keep-alive-seconds: 60 # 空闲线程存活时间（秒）
        compensate:
            pool:
                core-size: 10 # 核心线程数
                max-size: 12 # 最大线程数
                queue-capacity: 500 # 队列容量
                keep-alive-seconds: 60 # 空闲线程存活时间（秒）
        retry:
            pool:
                core-size: 10 # 核心线程数
                max-size: 12 # 最大线程数
                queue-capacity: 500 # 队列容量
                keep-alive-seconds: 60 # 空闲线程存活时间（秒）
            alarm:
                queue-threshold: 70 # 队列使用率告警阈值（%）
                active-threshold: 80 # 活跃率告警阈值（%）
                enabled: true # 是否启用告警
        failed-retry:
            cron: '0 0 1 * * ?' # 每天凌晨1点自动重试全部失败订单（可通过前端修改）
            enabled: true # 是否启用定时重试
        scheduler:
            enabled: false # 定时同步总开关（true=启用，false=禁用）
            interval-seconds: 1800 # 拉取间隔（秒）
            initial-delay-seconds: 30 # 启动后延迟首次执行时间（秒），生产环境多等一会儿
        shutdown:
            graceful-timeout-seconds: 60 # 优雅关闭超时时间（秒）
            force-shutdown-after-seconds: 90 # 强制关闭前等待时间（秒）
            enabled: false # 是否启用优雅关闭
        saas:
            push:
                enabled: false
                kafka:
                    topic: order-status-change
                    consumer-group-id: order-status-+consumer
                redis:
                    idempotent-key-prefix: 'order:push:consume:'
                    expire-seconds: 3600
                retry:
                    max-attempts: 3
                    retry-interval-ms: 2000
        kafka:
            topic:
                realtime: ele-order-realtime
            consumer:
                group-id: ele-order-realtime-consumer
            retry:
                topic: ele-order-retry
                dlq-topic: ele-order-retry-dlq
                max-retry-count: 3
                consumer:
                    group-id: ele-order-retry-consumer
                    dlq-group-id: ele-order-retry-dlq-consumer
                    concurrency: 5

--- #################### 消息队列相关 ####################

# rocketmq 配置项，对应 RocketMQProperties 配置类
rocketmq:
    name-server: 127.0.0.1:9876 # RocketMQ Namesrv

spring:
    # RabbitMQ 配置项，对应 RabbitProperties 配置类
    rabbitmq:
        host: 127.0.0.1 # RabbitMQ 服务的地址
        port: 5672 # RabbitMQ 服务的端口
        username: guest # RabbitMQ 服务的账号
        password: guest # RabbitMQ 服务的密码
    # Kafka 配置项
    kafka:
        bootstrap-servers: 127.0.0.1:9092 # Kafka Broker 地址（本地连接）
        # Producer 配置
        producer:
            acks: all # 所有 leader 和 follower 应答
            retries: 3 # 重试次数
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
        # Consumer 配置
        consumer:
            auto-offset-reset: earliest # 从最早 offset 开始消费
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
            enable-auto-commit: false # 手动提交，确保消息被正确处理后才提交
            max-poll-interval-ms: 300000 # 消费处理最大间隔（5分钟）
            session-timeout-ms: 30000 # 会话超时
            heartbeat-interval-ms: 10000 # 心跳间隔
        # Listener 配置
        listener:
            missing-topics-fatal: false # 主题不存在不报错
            ack-mode: manual # 手动确认模式
            concurrency: 3 # 默认并发消费者数量
        properties:
            spring:
                json:
                    trusted:
                        packages: '*'

# WebSocket 配置（使用 Kafka 作为消息发送）
yudao:
    websocket:
        enable: true
        sender-type: kafka
        sender-kafka:
            topic: ${spring.application.name}-websocket # WebSocket 消息 Topic
            consumer-group: ${spring.application.name}-websocket-consumer

--- #################### 服务保障相关配置 ####################

# Lock4j 配置项
lock4j:
    acquire-timeout: 10000 # 获取分布式锁超时时间，默认为 3000 毫秒
    expire: 60000 # 分布式锁的超时时间，默认为 30 毫秒

--- #################### 监控相关配置 ####################

# Actuator 监控端点的配置项
management:
    endpoints:
        web:
            base-path: /actuator # Actuator 提供的 API 接口的根目录。默认为 /actuator
            exposure:
                include: '*' # 需要开放的端点。默认值只打开 health 和 info 两个端点。通过设置 * ，可以开放所有端点。

# Spring Boot Admin 配置项
spring:
    boot:
        admin:
            # Spring Boot Admin Client 客户端的相关配置
            client:
                url: http://127.0.0.1:${server.port}/${spring.boot.admin.context-path} # 设置 Spring Boot Admin Server 地址
                instance:
                    service-host-type: IP # 注册实例时，优先使用 IP [IP, HOST_NAME, CANONICAL_HOST_NAME]
                username: admin
                password: admin
            # Spring Boot Admin Server 服务端的相关配置
            context-path: /admin # 配置 Spring

# 日志文件配置
logging:
    file:
        name: ${user.home}/logs/${spring.application.name}.log # 日志文件名，全路径
    level:
        # Spring Security 请求认证与授权流程
        org.springframework.security: WARN
        # Spring MVC 请求路由匹配
        org.springframework.web.servlet: WARN
        # Token 认证过滤器、业务代码
        cn.iocoder.yudao: WARN
        # 将 MyBatis-Plus 的日志级别调整为 WARN 或 ERROR，过滤SQL详细日志
        cn.iocoder.yudao.module.*.dal.mysql: WARN
        com.baomidou.mybatisplus: WARN
        # 关闭饿了么SDK详细日志输出
        ApiExecutor: WARN
        AbstractHttpClient: WARN
        me.ele: WARN
        lib.ele: WARN
        ocean: WARN

