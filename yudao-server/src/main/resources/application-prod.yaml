server:
    port: 8080
    address: 0.0.0.0 # 允许局域网访问
    shutdown: graceful # 启用优雅关闭
spring:
    lifecycle:
        timeout-per-shutdown-phase: 60s # 优雅关闭超时时间
    main:
        lazy-initialization: true # 启动耗时排查：延迟初始化 Bean，观察启动时间是否明显下降
    autoconfigure:
        # noinspection SpringBootApplicationYaml
        exclude:
            - org.springframework.ai.vectorstore.qdrant.autoconfigure.QdrantVectorStoreAutoConfiguration # 禁用 AI 模块的 Qdrant，手动创建
            - org.springframework.ai.vectorstore.milvus.autoconfigure.MilvusVectorStoreAutoConfiguration # 禁用 AI 模块的 Milvus，手动创建
    # 数据源配置项
    datasource:
        druid: # Druid 【监控】相关的全局配置
            web-stat-filter:
                enabled: true
                session-stat-enable: false # 关闭 Session 统计，避免 sessionStatMap is full 警告
            stat-view-servlet:
                enabled: true
                allow: # 设置白名单，不填则允许所有访问
                url-pattern: /druid/*
                login-username: # 控制台管理用户名和密码
                login-password:
            filter:
                stat:
                    enabled: true
                    log-slow-sql: true # 慢 SQL 记录
                    slow-sql-millis: 100
                    merge-sql: true
                wall:
                    config:
                        multi-statement-allow: true
        dynamic: # 多数据源配置
            druid: # Druid 【连接池】相关的全局配置
                initial-size: 20 # 初始连接数（从5提升到20，快速预热连接池）
                min-idle: 20 # 最小空闲连接数（从5提升到20，保持更多可用连接）
                max-active: 200 # 最大连接池数量（从100提升到200，阿里云RDS最大2000连接，当前仅占10%，充分利用数据库资源）
                max-wait: 30000 # 配置获取连接等待超时的时间，单位：毫秒（30秒）
                time-between-eviction-runs-millis: 15000 # 15 秒巡检一次空闲连接，降低远程链路空闲断开概率
                min-evictable-idle-time-millis: 120000 # 空闲 2 分钟后参与回收/保活检测
                max-evictable-idle-time-millis: 600000 # 空闲连接最长保留 10 分钟
                validation-query: SELECT 1 # MySQL 连接有效性检查
                test-while-idle: true
                test-on-borrow: true # 借连接时校验，避免拿到已断开的远程连接
                test-on-return: false
                keep-alive: true # 保持连接活性，减少远程链路空闲断开
                pool-prepared-statements: true # 是否开启 PreparedStatement 缓存
                max-pool-prepared-statement-per-connection-size: 20 # 每个连接缓存的 PreparedStatement 数量
                remove-abandoned: true # 自动回收泄漏连接
                remove-abandoned-timeout: 300 # 超过 5 分钟的连接强制回收
                log-abandoned: true # 记录泄漏连接日志
            primary: master
            datasource:
                master:
                    url: jdbc:mysql://rm-2ze347fljj75ppe85.mysql.rds.aliyuncs.com:3306/ytsh_prod?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&connectTimeout=10000&socketTimeout=120000&tcpKeepAlive=true
                    username: root
                    password: mysql$prod2026@ytsh
                slave:
                    lazy: true
                    url: jdbc:mysql://rm-2ze347fljj75ppe85.mysql.rds.aliyuncs.com:3306/ytsh_prod?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&connectTimeout=10000&socketTimeout=120000&tcpKeepAlive=true
                    username: root
                    password: mysql$prod2026@ytsh

    # Redis 配置。Redisson 默认的配置足够使用，一般不需要进行调优
    data:
        redis:
            host: 127.0.0.1 # 地址
            port: 6579 # 端口
            username: default
            password: YTSH+redis@2026
            #      password: YTSH_redis_2026
            database: 0 # 数据库索引
            connect-timeout: 10000ms # 建连超时
            timeout: 10000ms # 命令执行超时
            lettuce:
                pool:
                    min-idle: 20 # 连接池最小空闲连接数
                    max-idle: 80 # 连接池最大空闲连接数
                    max-active: 200 # 连接池最大连接数
                    max-wait: 5000 # 获取连接最大等待时间（毫秒）
                shutdown-timeout: 200ms # 关闭超时
            redisson:
                config: |
                    singleServerConfig:
                      address: "redis://127.0.0.1:6579"
                      username: "default"
                      password: "YTSH+redis@2026"
                      database: 0
                      connectTimeout: 30000          # 从10000升到30000,避免建连超时
                      timeout: 60000                 # 从10000升到60000,放宽命令执行超时
                      pingConnectionInterval: 3000   # 从5000降到3000,更频繁心跳检测连接活性
                      keepAlive: true                # 启用TCP KeepAlive
                      tcpNoDelay: true               # 禁用Nagle算法,降低延迟
                      idleConnectionTimeout: 120000  # 从180000降到120000,及时清理空闲连接
                      connectionMinimumIdleSize: 80  # 从64升到80,保持更多可用连接
                      connectionPoolSize: 350        # 从256升到350,提升并发能力
                      retryAttempts: 15              # 从5升到15,网络抖动时充分重试
                      retryInterval: 1500            # 从2000降到1500,加快重试频率
                      reconnectConnectionTimeout: 3000
                      subscriptionConnectionMinimumIdleSize: 4
                      subscriptionConnectionPoolSize: 16
                    threads: 128
                    nettyThreads: 256                # Netty线程池,处理异步IO
                    codec: !<org.redisson.codec.Kryo5Codec> {}
                    transportMode: "NIO"


